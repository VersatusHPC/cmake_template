name: ci
on:
  pull_request:
  release:
    types: [published]
  push:
    tags:
    branches:
      - master
      - main
      - develop

permissions:
  contents: read
  packages: read

env:
  CLANG_TIDY_VERSION: "19.1.1"
  VERBOSE: 1


jobs:
  # ---------------------------------------------------------------------------
  # Read CI config and compute matrix / container image names
  # ---------------------------------------------------------------------------
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      ci-image: ${{ steps.images.outputs.ci }}
      ci-intel-image: ${{ steps.images.outputs.ci-intel }}
      linux-compilers: ${{ steps.config.outputs.linux-compilers }}
      linux-enabled: ${{ steps.config.outputs.linux-enabled }}
      macos-compilers: ${{ steps.config.outputs.macos-compilers }}
      macos-enabled: ${{ steps.config.outputs.macos-enabled }}
      windows-matrix: ${{ steps.config.outputs.windows-matrix }}
      windows-enabled: ${{ steps.config.outputs.windows-enabled }}
    steps:
      - uses: actions/checkout@v6

      - id: images
        run: |
          # Use the template repo's pre-built CI images so that repos derived
          # from the template work on their very first push — before their own
          # build-ci-image workflow has had a chance to run.
          # If a project later needs a custom CI image, uncomment the lines
          # below and re-enable the per-repo build-ci-image workflow.
          #
          # REPO="${{ github.repository }}"
          # REPO_LC="${REPO,,}"
          # echo "ci=ghcr.io/${REPO_LC}/ci:latest" >> $GITHUB_OUTPUT
          # echo "ci-intel=ghcr.io/${REPO_LC}/ci-intel:latest" >> $GITHUB_OUTPUT
          echo "ci=ghcr.io/versatushpc/cmake_template/ci:latest" >> $GITHUB_OUTPUT
          echo "ci-intel=ghcr.io/versatushpc/cmake_template/ci-intel:latest" >> $GITHUB_OUTPUT

      - id: config
        env:
          CLANG_TIDY_VERSION: ${{ env.CLANG_TIDY_VERSION }}
        run: |
          CONFIG=$(yq -o=json . .github/ci-config.yml)

          # --- Linux ---
          LINUX=$(echo "$CONFIG" | jq -c '[.linux | to_entries[] | select(.value == true) | .key]')
          if [ "$LINUX" = "[]" ]; then
            echo "linux-enabled=false" >> $GITHUB_OUTPUT
            echo 'linux-compilers=["__skip__"]' >> $GITHUB_OUTPUT
          else
            echo "linux-enabled=true" >> $GITHUB_OUTPUT
            echo "linux-compilers=$LINUX" >> $GITHUB_OUTPUT
          fi

          # --- macOS (map 'llvm' to 'llvm-<version>' for setup-cpp) ---
          MACOS=$(echo "$CONFIG" | jq -c --arg v "$CLANG_TIDY_VERSION" \
            '[.macos | to_entries[] | select(.value == true) | .key |
              if . == "llvm" then "llvm-" + $v else . end]')
          if [ "$MACOS" = "[]" ]; then
            echo "macos-enabled=false" >> $GITHUB_OUTPUT
            echo 'macos-compilers=["__skip__"]' >> $GITHUB_OUTPUT
          else
            echo "macos-enabled=true" >> $GITHUB_OUTPUT
            echo "macos-compilers=$MACOS" >> $GITHUB_OUTPUT
          fi

          # --- Windows (generate full matrix as JSON include array) ---
          LLVM_VER="llvm-${CLANG_TIDY_VERSION}"
          WIN_MATRIX='[]'

          MSVC_ENABLED=$(echo "$CONFIG" | jq '.windows.msvc // false')
          LLVM_ENABLED=$(echo "$CONFIG" | jq '.windows.llvm // false')

          if [ "$MSVC_ENABLED" = "true" ]; then
            WIN_MATRIX=$(echo "$WIN_MATRIX" | jq '. +
              [{"compiler":"msvc","generator":"Visual Studio 17 2022","build_type":"Debug","packaging_maintainer_mode":"ON","enable_ipo":"On"},
               {"compiler":"msvc","generator":"Visual Studio 17 2022","build_type":"Release","packaging_maintainer_mode":"ON","enable_ipo":"On"},
               {"compiler":"msvc","generator":"Visual Studio 17 2022","build_type":"Debug","packaging_maintainer_mode":"OFF","enable_ipo":"Off"},
               {"compiler":"msvc","generator":"Visual Studio 17 2022","build_type":"Release","packaging_maintainer_mode":"OFF","enable_ipo":"Off","package_generator":"ZIP"},
               {"compiler":"msvc","generator":"Visual Studio 17 2022","build_type":"Release","packaging_maintainer_mode":"ON","enable_ipo":"On","build_shared":"ON"}]')
          fi

          if [ "$LLVM_ENABLED" = "true" ]; then
            WIN_MATRIX=$(echo "$WIN_MATRIX" | jq --arg c "$LLVM_VER" '. +
              [{"compiler":$c,"generator":"Ninja Multi-Config","build_type":"Debug","packaging_maintainer_mode":"ON","enable_ipo":"Off"},
               {"compiler":$c,"generator":"Ninja Multi-Config","build_type":"Release","packaging_maintainer_mode":"ON","enable_ipo":"Off"},
               {"compiler":$c,"generator":"Ninja Multi-Config","build_type":"Debug","packaging_maintainer_mode":"OFF","enable_ipo":"Off"},
               {"compiler":$c,"generator":"Ninja Multi-Config","build_type":"Release","packaging_maintainer_mode":"OFF","enable_ipo":"Off"}]')
          fi

          if [ "$WIN_MATRIX" = "[]" ]; then
            echo "windows-enabled=false" >> $GITHUB_OUTPUT
            echo 'windows-matrix=[{"compiler":"__skip__"}]' >> $GITHUB_OUTPUT
          else
            echo "windows-enabled=true" >> $GITHUB_OUTPUT
            echo "windows-matrix=$(echo "$WIN_MATRIX" | jq -c .)" >> $GITHUB_OUTPUT
          fi

  # ---------------------------------------------------------------------------
  # Linux — UBI 10 container, all tools pre-installed
  # ---------------------------------------------------------------------------
  Linux:
    name: Linux ${{ matrix.compiler }} ${{ matrix.build_type }} ${{ matrix.packaging_maintainer_mode == 'ON' && '(maintainer)' || '' }}
    if: needs.setup.outputs.linux-enabled == 'true'
    needs: setup
    runs-on: ubuntu-latest
    container:
      image: ${{ (matrix.compiler == 'intel' && needs.setup.outputs.ci-intel-image) || needs.setup.outputs.ci-image }}
    strategy:
      fail-fast: false
      matrix:
        compiler: ${{ fromJSON(needs.setup.outputs.linux-compilers) }}
        build_type:
          - Release
          - Debug
        packaging_maintainer_mode:
          - ON
          - OFF

    steps:
      - uses: actions/checkout@v6

      - name: Setup Cache
        uses: ./.github/actions/setup_cache
        with:
          compiler: ${{ matrix.compiler }}
          build_type: ${{ matrix.build_type }}
          packaging_maintainer_mode: ${{ matrix.packaging_maintainer_mode }}
          generator: "Ninja Multi-Config"

      - name: Project Name
        uses: cardinalby/export-env-action@v2
        with:
          envFile: '.github/constants.env'

      - name: Enable GCC 15 toolset
        if: matrix.compiler == 'gcc-15'
        run: |
          if [ -f /opt/rh/gcc-toolset-15/enable ]; then
            source /opt/rh/gcc-toolset-15/enable
          else
            # EL10 gcc-toolset-15-runtime may not ship the enable script
            export PATH="/opt/rh/gcc-toolset-15/root/usr/bin:$PATH"
            export LD_LIBRARY_PATH="/opt/rh/gcc-toolset-15/root/usr/lib64:${LD_LIBRARY_PATH:-}"
          fi
          echo "PATH=$PATH" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=${LD_LIBRARY_PATH:-}" >> $GITHUB_ENV
          gcc --version

      - name: Set compiler environment
        run: |
          case "${{ matrix.compiler }}" in
            gcc-14|gcc-15)
              echo "CC=gcc"              >> $GITHUB_ENV
              echo "CXX=g++"             >> $GITHUB_ENV
              echo "GCOV_EXECUTABLE=gcov" >> $GITHUB_ENV
              echo "ENABLE_IPO=Off"      >> $GITHUB_ENV
              ;;
            clang)
              echo "CC=clang"                     >> $GITHUB_ENV
              echo "CXX=clang++"                  >> $GITHUB_ENV
              echo "GCOV_EXECUTABLE=llvm-cov gcov" >> $GITHUB_ENV
              echo "ENABLE_IPO=Off"               >> $GITHUB_ENV
              ;;
            intel)
              echo "CC=icx"                       >> $GITHUB_ENV
              echo "CXX=icpx"                     >> $GITHUB_ENV
              echo "GCOV_EXECUTABLE=llvm-cov gcov" >> $GITHUB_ENV
              echo "ENABLE_IPO=Off"               >> $GITHUB_ENV
              ;;
          esac
          # Package generator
          if [[ "${{ matrix.build_type }}" == "Release" && "${{ matrix.packaging_maintainer_mode }}" == "ON" ]]; then
            echo "PACKAGE_GENERATOR=TBZ2" >> $GITHUB_ENV
          fi

      - name: Pre-install Conan deps for GCC
        if: ${{ contains(matrix.compiler, 'gcc') }}
        run: |
          # The cmake-conan provider may not set compiler.libcxx=libstdc++11,
          # causing ABI mismatch (old std::string vs std::__cxx11::basic_string).
          # Pre-install deps with an explicit GCC profile.
          GCC_VER=$(${CC:-gcc} -dumpversion | cut -d. -f1)
          conan profile detect --force
          sed -i "s/compiler.libcxx=.*/compiler.libcxx=libstdc++11/" ~/.conan2/profiles/default
          sed -i "s/compiler.cppstd=.*/compiler.cppstd=23/" ~/.conan2/profiles/default
          cat ~/.conan2/profiles/default
          conan install . --output-folder=build --build=missing -s build_type=Debug
          conan install . --output-folder=build --build=missing -s build_type=Release
          conan install . --output-folder=build --build=missing -s build_type=RelWithDebInfo

      - name: Configure Conan for Intel ICX
        if: matrix.compiler == 'intel'
        run: |
          ICX_CLANG_VER=$(icx -dM -E -x c /dev/null 2>/dev/null | grep __clang_major__ | awk '{print $3}')
          echo "ICX underlying Clang version: $ICX_CLANG_VER"
          CC=clang CXX=clang++ conan profile detect --force
          sed -i "s/compiler.version=.*/compiler.version=$ICX_CLANG_VER/" ~/.conan2/profiles/default
          sed -i "s/compiler.cppstd=.*/compiler.cppstd=23/" ~/.conan2/profiles/default
          cat ~/.conan2/profiles/default
          conan install . --output-folder=build --build=missing -s build_type=Debug
          conan install . --output-folder=build --build=missing -s build_type=Release
          conan install . --output-folder=build --build=missing -s build_type=RelWithDebInfo

      - name: Configure CMake
        run: |
          EXTRA_CMAKE_ARGS=""
          if [[ "${{ matrix.compiler }}" == "intel" || "${{ matrix.compiler }}" =~ gcc ]]; then
            EXTRA_CMAKE_ARGS="-D${{ env.PROJECT_NAME }}_SKIP_CONAN_PROVIDER=ON -DCMAKE_PREFIX_PATH=$PWD/build"
          fi
          cmake -S . -B ./build -G "Ninja Multi-Config" \
            $EXTRA_CMAKE_ARGS \
            -D${{ env.PROJECT_NAME }}_ENABLE_IPO=${{ env.ENABLE_IPO }} \
            -DCMAKE_BUILD_TYPE:STRING=${{ matrix.build_type }} \
            -D${{ env.PROJECT_NAME }}_PACKAGING_MAINTAINER_MODE:BOOL=${{ matrix.packaging_maintainer_mode }} \
            -D${{ env.PROJECT_NAME }}_ENABLE_COVERAGE:BOOL=${{ matrix.build_type == 'Debug' }} \
            -D${{ env.PROJECT_NAME }}_ENABLE_BLOATY:BOOL=ON \
            -D${{ env.PROJECT_NAME }}_ENABLE_INCLUDE_WHAT_YOU_USE:BOOL=${{ contains(matrix.compiler, 'clang') }} \
            -DGIT_SHA:STRING=${{ github.sha }}

      - name: Build
        run: cmake --build ./build --config ${{ matrix.build_type }}

      - name: Test and coverage
        working-directory: ./build
        run: |
          ctest -C ${{ matrix.build_type }}
          gcovr -j $(nproc) --root ../ --print-summary --xml-pretty --xml coverage.xml . --gcov-executable '${{ env.GCOV_EXECUTABLE }}'

      - name: CPack
        if: env.PACKAGE_GENERATOR != ''
        working-directory: ./build
        run: |
          cpack -C ${{ matrix.build_type }} -G ${{ env.PACKAGE_GENERATOR }}

      - name: Publish Tagged Release
        uses: softprops/action-gh-release@v2
        if: ${{ startsWith(github.ref, 'refs/tags/') && env.PACKAGE_GENERATOR != '' }}
        with:
          files: |
            build/*-*${{ matrix.build_type }}*-*.*

      - name: Publish to codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: true
          flags: ${{ runner.os }}
          name: ${{ runner.os }}-coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./build/coverage.xml

  # ---------------------------------------------------------------------------
  # Linux — Unix Makefiles build (verifies non-multiconfig generators)
  # ---------------------------------------------------------------------------
  Linux-Make:
    name: Linux gcc-14 Debug (Make)
    if: needs.setup.outputs.linux-enabled == 'true' && contains(fromJSON(needs.setup.outputs.linux-compilers), 'gcc-14')
    needs: setup
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.setup.outputs.ci-image }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Cache
        uses: ./.github/actions/setup_cache
        with:
          compiler: gcc-14
          build_type: Debug
          packaging_maintainer_mode: ON
          generator: "Unix Makefiles"

      - name: Project Name
        uses: cardinalby/export-env-action@v2
        with:
          envFile: '.github/constants.env'

      - name: Pre-install Conan deps
        run: |
          conan profile detect --force
          sed -i "s/compiler.libcxx=.*/compiler.libcxx=libstdc++11/" ~/.conan2/profiles/default
          sed -i "s/compiler.cppstd=.*/compiler.cppstd=23/" ~/.conan2/profiles/default
          conan install . --output-folder=build --build=missing -s build_type=Debug

      - name: Configure CMake
        run: |
          cmake -S . -B ./build -G "Unix Makefiles" \
            -D${{ env.PROJECT_NAME }}_SKIP_CONAN_PROVIDER=ON -DCMAKE_PREFIX_PATH=$PWD/build \
            -D${{ env.PROJECT_NAME }}_ENABLE_IPO=Off \
            -DCMAKE_BUILD_TYPE:STRING=Debug \
            -D${{ env.PROJECT_NAME }}_PACKAGING_MAINTAINER_MODE:BOOL=ON \
            -D${{ env.PROJECT_NAME }}_ENABLE_COVERAGE:BOOL=ON \
            -D${{ env.PROJECT_NAME }}_ENABLE_BLOATY:BOOL=ON \
            -D${{ env.PROJECT_NAME }}_ENABLE_INCLUDE_WHAT_YOU_USE:BOOL=OFF \
            -DGIT_SHA:STRING=${{ github.sha }}

      - name: Build
        run: cmake --build ./build --config Debug

      - name: Test
        working-directory: ./build
        run: ctest -C Debug

  # ---------------------------------------------------------------------------
  # macOS — bare runner with setup-cpp
  # ---------------------------------------------------------------------------
  macOS:
    name: macOS ${{ matrix.compiler }} ${{ matrix.build_type }} ${{ matrix.packaging_maintainer_mode == 'ON' && '(maintainer)' || '' }}
    if: needs.setup.outputs.macos-enabled == 'true'
    needs: setup
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: ${{ fromJSON(needs.setup.outputs.macos-compilers) }}
        build_type:
          - Release
          - Debug
        packaging_maintainer_mode:
          - ON
          - OFF

    steps:
      - name: Check for llvm version mismatches
        if: ${{ contains(matrix.compiler, 'llvm') && !contains(matrix.compiler, env.CLANG_TIDY_VERSION) }}
        uses: actions/github-script@v8
        with:
          script: |
            core.setFailed('There is a mismatch between configured llvm compiler and clang-tidy version chosen')

      - uses: actions/checkout@v6

      - name: Setup Cache
        uses: ./.github/actions/setup_cache
        with:
          compiler: ${{ matrix.compiler }}
          build_type: ${{ matrix.build_type }}
          packaging_maintainer_mode: ${{ matrix.packaging_maintainer_mode }}
          generator: "Ninja Multi-Config"

      - name: Project Name
        uses: cardinalby/export-env-action@v2
        with:
          envFile: '.github/constants.env'

      - name: Setup Cpp
        uses: aminya/setup-cpp@v1
        with:
          compiler: ${{ matrix.compiler }}
          cmake: true
          ninja: true
          vcpkg: false
          ccache: true
          clangtidy: ${{ env.CLANG_TIDY_VERSION }}
          cppcheck: true
          gcovr: true

      - name: Install Conan and Lizard
        run: pip install conan lizard

      - name: Set compiler environment
        run: |
          case "${{ matrix.compiler }}" in
            llvm*)
              echo "GCOV_EXECUTABLE=llvm-cov gcov" >> $GITHUB_ENV
              echo "ENABLE_IPO=Off" >> $GITHUB_ENV
              ;;
            gcc-*)
              GCC_VER=$(echo "${{ matrix.compiler }}" | grep -o '[0-9]*')
              echo "GCOV_EXECUTABLE=gcov-${GCC_VER}" >> $GITHUB_ENV
              echo "ENABLE_IPO=Off" >> $GITHUB_ENV
              ;;
          esac
          # Package generator
          if [[ "${{ matrix.build_type }}" == "Release" && "${{ matrix.packaging_maintainer_mode }}" == "ON" ]]; then
            echo "PACKAGE_GENERATOR=TBZ2" >> $GITHUB_ENV
          fi

      - name: Pre-install Conan deps for macOS GCC
        if: ${{ contains(matrix.compiler, 'gcc') }}
        run: |
          conan profile detect --force
          GCC_VER=$(echo "${{ matrix.compiler }}" | grep -o '[0-9]*')
          cat > ~/.conan2/profiles/default << PROFILE
          [settings]
          arch=armv8
          build_type=Release
          compiler=gcc
          compiler.cppstd=23
          compiler.libcxx=libstdc++11
          compiler.version=$GCC_VER
          os=Macos
          [conf]
          tools.build:compiler_executables={"c": "gcc-$GCC_VER", "cpp": "g++-$GCC_VER"}
          PROFILE
          cat ~/.conan2/profiles/default
          conan install . --output-folder=build --build=missing -s build_type=Debug
          conan install . --output-folder=build --build=missing -s build_type=Release
          conan install . --output-folder=build --build=missing -s build_type=RelWithDebInfo

      - name: Configure CMake
        run: |
          EXTRA_CMAKE_ARGS=""
          if [[ "${{ matrix.compiler }}" =~ gcc ]]; then
            EXTRA_CMAKE_ARGS="-D${{ env.PROJECT_NAME }}_SKIP_CONAN_PROVIDER=ON -DCMAKE_PREFIX_PATH=$PWD/build"
          fi
          cmake -S . -B ./build -G "Ninja Multi-Config" \
            $EXTRA_CMAKE_ARGS \
            -D${{ env.PROJECT_NAME }}_ENABLE_IPO=${{ env.ENABLE_IPO }} \
            -DCMAKE_BUILD_TYPE:STRING=${{ matrix.build_type }} \
            -D${{ env.PROJECT_NAME }}_PACKAGING_MAINTAINER_MODE:BOOL=${{ matrix.packaging_maintainer_mode }} \
            -D${{ env.PROJECT_NAME }}_ENABLE_COVERAGE:BOOL=${{ matrix.build_type == 'Debug' }} \
            -D${{ env.PROJECT_NAME }}_ENABLE_BLOATY:BOOL=OFF \
            -D${{ env.PROJECT_NAME }}_ENABLE_INCLUDE_WHAT_YOU_USE:BOOL=OFF \
            -DGIT_SHA:STRING=${{ github.sha }}

      - name: Build
        run: cmake --build ./build --config ${{ matrix.build_type }}

      - name: Test and coverage
        working-directory: ./build
        run: |
          ctest -C ${{ matrix.build_type }}
          # macOS GCC coverage broken — libgcov link failure (issue #5)
          if [[ ! "${{ matrix.compiler }}" =~ gcc ]]; then
            gcovr -j $(sysctl -n hw.ncpu) --root ../ --print-summary --xml-pretty --xml coverage.xml . --gcov-executable '${{ env.GCOV_EXECUTABLE }}'
          fi

      - name: CPack
        if: env.PACKAGE_GENERATOR != ''
        working-directory: ./build
        run: |
          cpack -C ${{ matrix.build_type }} -G ${{ env.PACKAGE_GENERATOR }}

      - name: Publish Tagged Release
        uses: softprops/action-gh-release@v2
        if: ${{ startsWith(github.ref, 'refs/tags/') && env.PACKAGE_GENERATOR != '' }}
        with:
          files: |
            build/*-*${{ matrix.build_type }}*-*.*

      - name: Publish to codecov
        if: ${{ !contains(matrix.compiler, 'gcc') }}
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: true
          flags: ${{ runner.os }}
          name: ${{ runner.os }}-coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./build/coverage.xml

  # ---------------------------------------------------------------------------
  # Windows — bare runner with setup-cpp
  # ---------------------------------------------------------------------------
  Windows:
    name: Windows ${{ matrix.compiler }} ${{ matrix.build_type }} ${{ matrix.packaging_maintainer_mode == 'ON' && '(maintainer)' || '' }}
    if: needs.setup.outputs.windows-enabled == 'true'
    needs: setup
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.windows-matrix) }}

    steps:
      - name: Check for llvm version mismatches
        if: ${{ contains(matrix.compiler, 'llvm') && !contains(matrix.compiler, env.CLANG_TIDY_VERSION) }}
        uses: actions/github-script@v8
        with:
          script: |
            core.setFailed('There is a mismatch between configured llvm compiler and clang-tidy version chosen')

      - uses: actions/checkout@v6

      - name: Setup Cache
        uses: ./.github/actions/setup_cache
        with:
          compiler: ${{ matrix.compiler }}
          build_type: ${{ matrix.build_type }}
          packaging_maintainer_mode: ${{ matrix.packaging_maintainer_mode }}
          generator: ${{ matrix.generator }}

      - name: Project Name
        uses: cardinalby/export-env-action@v2
        with:
          envFile: '.github/constants.env'

      - name: Setup Cpp
        uses: aminya/setup-cpp@v1
        with:
          compiler: ${{ matrix.compiler }}
          vcvarsall: true
          cmake: true
          ninja: true
          vcpkg: false
          ccache: true
          clangtidy: ${{ env.CLANG_TIDY_VERSION }}
          cppcheck: true
          opencppcoverage: true

      - name: Install Conan and Lizard
        run: pip install conan lizard

      - name: Configure CMake
        run: |
          cmake -S . -B ./build -G "${{ matrix.generator }}" -D${{ env.PROJECT_NAME }}_ENABLE_IPO=${{ matrix.enable_ipo }} -DCMAKE_BUILD_TYPE:STRING=${{ matrix.build_type }} -D${{ env.PROJECT_NAME }}_PACKAGING_MAINTAINER_MODE:BOOL=${{ matrix.packaging_maintainer_mode }} -D${{ env.PROJECT_NAME }}_ENABLE_COVERAGE:BOOL=${{ matrix.build_type == 'Debug' }} -D${{ env.PROJECT_NAME }}_ENABLE_BLOATY:BOOL=OFF -D${{ env.PROJECT_NAME }}_ENABLE_INCLUDE_WHAT_YOU_USE:BOOL=OFF -DGIT_SHA:STRING=${{ github.sha }}

      - name: Build
        run: cmake --build ./build --config ${{ matrix.build_type }}

      - name: Test and coverage
        working-directory: ./build
        run: |
          OpenCppCoverage.exe --export_type cobertura:coverage.xml --cover_children -- ctest -C ${{ matrix.build_type }}

      - name: CPack
        if: matrix.package_generator != ''
        working-directory: ./build
        run: |
          cpack -C ${{ matrix.build_type }} -G ${{ matrix.package_generator }}

      - name: Publish Tagged Release
        uses: softprops/action-gh-release@v2
        if: ${{ startsWith(github.ref, 'refs/tags/') && matrix.package_generator != '' }}
        with:
          files: |
            build/*-*${{ matrix.build_type }}*-*.*

      - name: Publish to codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: true
          flags: ${{ runner.os }}
          name: ${{ runner.os }}-coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./build/coverage.xml
